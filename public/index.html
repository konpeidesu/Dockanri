<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="社内ドキュメントの更新・レビュー・履歴を一元管理するDocument Lifecycle Manager" />
    <title>Document Lifecycle Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div>
            <strong>Document</strong>
            <span>Lifecycle Manager</span>
          </div>
        </div>

        <nav class="main-nav" aria-label="メインメニュー">
          <button class="nav-item active" data-page="dashboard">
            <span class="nav-icon">⌂</span><span>ダッシュボード</span>
          </button>
          <button class="nav-item" data-page="documents">
            <span class="nav-icon">▤</span><span>ドキュメント</span>
            <span class="nav-count" id="documentNavCount">24</span>
          </button>
          <button class="nav-item" data-page="requests">
            <span class="nav-icon">↗</span><span>更新依頼</span>
            <span class="nav-count alert" id="requestNavCount">8</span>
          </button>
          <button class="nav-item" data-page="history">
            <span class="nav-icon">↺</span><span>更新履歴</span>
          </button>
        </nav>

        <div class="sidebar-section">
          <p>管理</p>
          <button class="nav-item muted" data-page="members"><span class="nav-icon">♙</span><span>ユーザー管理</span></button>
          <button class="nav-item muted" data-page="modules"><span class="nav-icon">◇</span><span>モジュール管理</span></button>
          <button class="nav-item muted" data-page="rules"><span class="nav-icon">☷</span><span>ドキュメント種別管理</span></button>
          <button class="nav-item muted" data-page="settings"><span class="nav-icon">⚙</span><span>設定</span></button>
        </div>

        <div class="sidebar-footer">
          <div class="sync-card">
            <div class="sync-icon">✓</div>
            <div><strong>同期済み</strong><span>最終更新 2分前</span></div>
          </div>
          <div class="user-card">
            <div class="avatar avatar-dark">KS</div>
            <div><strong>加藤 翔太</strong><span>SE Manager</span></div>
            <button aria-label="ユーザーメニュー">•••</button>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <button class="mobile-menu" id="mobileMenu" aria-label="メニューを開く">☰</button>
          <div class="global-search">
            <span>⌕</span>
            <input id="globalSearch" type="search" placeholder="ドキュメント、担当者を検索..." />
            <kbd>⌘ K</kbd>
          </div>
          <div class="top-actions">
            <button class="icon-button" aria-label="通知"><span>♢</span><i></i></button>
            <button class="primary-button" id="newRequestButton"><span>＋</span> 更新依頼を作成</button>
          </div>
        </header>

        <div id="app"></div>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="requestModal">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">NEW REQUEST</p>
            <h2 id="modalTitle">更新依頼を作成</h2>
          </div>
          <button class="modal-close" id="closeModal" aria-label="閉じる">×</button>
        </div>
        <form id="requestForm">
          <label>対象ドキュメント
            <select id="requestDocument" required></select>
          </label>
          <label>更新理由
            <textarea id="requestReason" rows="3" placeholder="更新が必要になった背景を入力してください" required></textarea>
          </label>
          <label>更新内容
            <textarea id="requestContent" rows="3" placeholder="予定している変更内容を入力してください" required></textarea>
          </label>
          <div class="form-grid">
            <label>更新希望期限（任意）
              <input id="requestDeadline" type="date" />
            </label>
            <label>添付URL
              <input id="requestAttachmentUrl" type="url" placeholder="https://..." />
            </label>
          </div>
          <label>コメント
            <textarea id="requestComment" rows="2" placeholder="担当者への補足事項"></textarea>
          </label>
          <div class="auto-assignment-preview" id="requestAutoPreview"></div>
          <div class="modal-actions">
            <button type="button" class="secondary-button" id="cancelModal">キャンセル</button>
            <button type="submit" class="primary-button">更新依頼を作成</button>
          </div>
        </form>
      </section>
    </div>

    <input class="hidden" id="memberCsvInput" type="file" accept=".csv,text/csv" />
    <input class="hidden" id="documentCsvInput" type="file" accept=".csv,text/csv" />

    <div class="detail-backdrop hidden" id="detailBackdrop"></div>
    <aside class="detail-panel" id="detailPanel" aria-label="ドキュメント詳細"></aside>

    <div class="modal-backdrop hidden" id="moduleModal">
      <section class="modal modal-small" role="dialog" aria-modal="true" aria-labelledby="moduleModalTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">MODULE MASTER</p>
            <h2 id="moduleModalTitle">モジュールを追加</h2>
          </div>
          <button class="modal-close" id="closeModuleModal" aria-label="閉じる">×</button>
        </div>
        <form id="moduleForm">
          <input id="moduleEditId" type="hidden" />
          <label>モジュール名
            <input id="moduleName" required maxlength="100" />
          </label>
          <label class="checkbox-label">
            <input id="moduleActive" type="checkbox" checked />
            有効なモジュールとして登録
          </label>
          <label class="checkbox-label">
            <input id="moduleImportant" type="checkbox" />
            重要モジュール
          </label>
          <div class="modal-actions">
            <button type="button" class="secondary-button" id="cancelModuleModal">キャンセル</button>
            <button type="submit" class="primary-button">保存</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop hidden" id="memberModal">
      <section class="modal modal-small" role="dialog" aria-modal="true" aria-labelledby="memberModalTitle">
        <div class="modal-header">
          <div><p class="eyebrow">USER MASTER</p><h2 id="memberModalTitle">ユーザーを追加</h2></div>
          <button class="modal-close" id="closeMemberModal" aria-label="閉じる">×</button>
        </div>
        <form id="memberForm">
          <input id="memberEditId" type="hidden" />
          <label>ユーザー名<input id="memberName" required maxlength="100" /></label>
          <label>ロール
            <select id="memberRole" required><option>SE</option><option>PE</option><option>PSE</option><option>CSM</option></select>
          </label>
          <label>担当モジュール
            <div class="module-checklist" id="memberModules"></div>
            <span class="field-hint">クリックして複数のモジュールを選択できます。</span>
          </label>
          <label class="checkbox-label"><input id="memberActive" type="checkbox" checked />有効なユーザー</label>
          <div class="modal-actions">
            <button type="button" class="secondary-button" id="cancelMemberModal">キャンセル</button>
            <button type="submit" class="primary-button">保存</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop hidden" id="ruleModal">
      <section class="modal modal-small" role="dialog" aria-modal="true" aria-labelledby="ruleModalTitle">
        <div class="modal-header">
          <div><p class="eyebrow">DOCUMENT TYPE</p><h2 id="ruleModalTitle">ドキュメント種別を追加</h2></div>
          <button class="modal-close" id="closeRuleModal" aria-label="閉じる">×</button>
        </div>
        <form id="ruleForm">
          <input id="ruleEditId" type="hidden" />
          <label>ドキュメント種別<input id="ruleCategory" required maxlength="100" /></label>
          <label>管理ロール
            <select id="ruleRoles" multiple required><option>SE</option><option>PE</option><option>PSE</option><option>CSM</option></select>
            <span class="field-hint">複数ロールを選択できます。</span>
          </label>
          <label class="checkbox-label"><input id="ruleImportant" type="checkbox" />重要ドキュメント</label>
          <div class="modal-actions">
            <button type="button" class="secondary-button" id="cancelRuleModal">キャンセル</button>
            <button type="submit" class="primary-button">保存</button>
          </div>
        </form>
      </section>
    </div>

    <div class="toast hidden" id="toast"><span>✓</span><p></p></div>
    <script src="/app.js"></script>
  </body>
</html>
