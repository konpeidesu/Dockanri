name: dockanri

services:
  app:
    image: ${DLM_IMAGE:-dockanri:local}
    build:
      context: .
    container_name: dockanri-app
    restart: unless-stopped
    ports:
      - "${DLM_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6
