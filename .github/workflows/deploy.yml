name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dockanri-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy container
    runs-on:
      - self-hosted
      - linux
    timeout-minutes: 15
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker version
          docker compose version

      - name: Build application image
        env:
          IMAGE_NAME: dockanri:${{ github.sha }}
        run: docker build --pull --tag "$IMAGE_NAME" .

      - name: Deploy application
        env:
          DLM_IMAGE: dockanri:${{ github.sha }}
          DLM_PORT: ${{ vars.DLM_PORT || '3000' }}
        run: docker compose up --detach --no-build --remove-orphans

      - name: Wait for healthy container
        shell: bash
        run: |
          for attempt in {1..18}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' dockanri-app 2>/dev/null || true)"
            echo "Health status: ${status:-starting} (${attempt}/18)"

            if [ "$status" = "healthy" ]; then
              docker compose ps
              exit 0
            fi

            if [ "$status" = "unhealthy" ]; then
              docker compose logs --no-color --tail=100
              exit 1
            fi

            sleep 5
          done

          docker compose logs --no-color --tail=100
          echo "Container did not become healthy in time."
          exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=100
