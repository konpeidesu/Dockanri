name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dockanri-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy container
    runs-on: self-hosted
    timeout-minutes: 15
    environment: production
    env:
      DLM_IMAGE: dockanri:${{ github.sha }}
      DLM_PORT: ${{ vars.DLM_PORT || '3000' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker version
          docker compose version

      - name: Build application image
        run: docker build --pull --tag "${{ env.DLM_IMAGE }}" .

      - name: Deploy application
        run: docker compose up --detach --no-build --remove-orphans --wait --wait-timeout 90

      - name: Show deployment status
        run: docker compose ps

      - name: Verify application endpoint
        run: |
          docker exec dockanri-app node -e "fetch('http://127.0.0.1:3000').then(async (response) => { if (!response.ok) throw new Error('HTTP ' + response.status); const body = await response.text(); if (!body.includes('Document Lifecycle Manager')) throw new Error('Unexpected response'); console.log('Application endpoint is ready: HTTP ' + response.status) }).catch((error) => { console.error(error); process.exit(1) })"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=100
